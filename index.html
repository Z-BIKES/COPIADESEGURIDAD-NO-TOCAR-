    <script src="https://cdn.tailwindcss.com"></script>
    
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; }

        [x-cloak] { display: none !important; }
        
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

<body class="bg-white text-black" x-data="{ page: 'home', isMenuOpen: false }">

        </div>

        <div x-show="isMenuOpen" x-cloak @click.away="isMenuOpen = false" class="absolute top-full left-0 w-full bg-white border-b border-gray-100 flex flex-col p-6 gap-4 md:hidden shadow-xl">
            <button @click="page = 'home'; isMenuOpen = false; window.scrollTo(0,0)" class="text-left py-2 border-b border-gray-50">Inicio</button>

Lo hago atraves del ciclismo y las ventas.

Las bestias subieron al arca unicamente por el diluvio luego volvieron a su hábitat.

                <section class="mx-6 md:mx-20 my-16 p-12 text-center border-2 border-[#d4af37] flex flex-col items-center">

                        <button type="submit" class="w-full py-4 bg-[#d4af37] text-black font-bold uppercase tracking-widest hover:bg-black hover:text-[#d4af37] transition-all">Reclamar Acceso</button>

        <template x-if="page === 'curso'">

        <div class="space-y-2 opacity-40 text-[10px] uppercase tracking-[3px] font-bold">
